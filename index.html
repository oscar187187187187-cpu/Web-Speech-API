<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanisch Video Call Übung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- SETUP BEREICH -->
        <div id="setup-screen" class="screen active">
            <h1>🇪🇸 Spanisch Call Setup</h1>
            <p>Gib deinen Grok (xAI) API-Key ein:</p>
            <input type="password" id="api-key" placeholder="xai-...">
            
            <p>Füge deine Vokabeln ein (kommagetrennt):</p>
            <textarea id="vocab-list" placeholder="hola, como, estas, bien, perro, gato, comer, yo, tu..."></textarea>
            
            <button id="start-call-btn">Anruf starten</button>
            <p class="note">Hinweis: Die KI wird die Konversation automatisch beginnen!</p>
        </div>

        <!-- CALL BEREICH -->
        <div id="call-screen" class="screen">
            <div class="video-container">
                <!-- Simulierter Avatar der KI -->
                <div class="avatar" id="ai-avatar">🤖</div>
                <div class="status" id="status-text">Verbunden...</div>
            </div>
            
            <div class="controls">
                <button id="mic-btn" class="mic-btn">🎙️ Sprechen (Halten oder Klicken)</button>
            </div>

            <div class="transcript-box">
                <h3>Transkript:</h3>
                <div id="chat-log"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
